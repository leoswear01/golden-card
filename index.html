<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Leos Wear Golden Club</title>

    <link rel="stylesheet" href="style.css">

    <script defer src="script.js"></script>
</head>

<body>

<header>

    <div class="logo">
        LEOS WEAR
    </div>

    <div class="member">
        GOLDEN MEMBER
    </div>

</header>

<section class="hero">

    <h1>WELCOME TO</h1>

    <h2>LEOS WEAR GOLDEN CLUB</h2>

    <p>
        Exclusive Monthly Discounts, Secret Coupons & VIP Offers.
    </p>

</section>

<section class="offer-card">

    <h3>🎉 THIS MONTH'S OFFER</h3>

    <div class="discount">

        10% OFF

    </div>

    <div class="coupon-box">

        <h4>Your Coupon</h4>

        <div id="coupon">

            JULY25

        </div>

    </div>

    <button id="copyCoupon">

        Copy Coupon

    </button>

</section>

<section class="countdown">

    <h3>Offer Ends In</h3>

    <div id="timer">

        Loading...

    </div>

</section>

<section class="claim">

    <button id="claimBtn">

        Claim Discount via WhatsApp

    </button>

</section>

<section class="products">

    <h2>🔥 Latest Collection</h2>

    <div class="gallery">

        <div class="product">
            Product 1
        </div>

        <div class="product">
            Product 2
        </div>

        <div class="product">
            Product 3
        </div>

    </div>

</section>

<footer>

    © 2026 Leos Wear

</footer>

</body>

</html>
